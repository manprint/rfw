# ============================================================
# rfw — Forwarder configuration file
#
# Usage:  rfw -f forwarders.yml
# ============================================================

forwarders:
  # Forward local port 8080 to a web server
  - local_host: "127.0.0.1"
    local_port: 8080
    remote_host: "192.168.1.100"
    remote_port: 80

  # Forward local port 3306 to a remote database
  - local_host: "0.0.0.0"
    local_port: 3306
    remote_host: "db-prod.example.com"
    remote_port: 3306

  # Forward local port 443 to a cloud service
  - local_host: "0.0.0.0"
    local_port: 443
    remote_host: "app.azure.com"
    remote_port: 443

# ------------------------------------------------------------
# Optional runtime settings (all fields optional; defaults shown).
# CLI flags (--metrics-addr, --report-interval, --sample-interval,
# --buffer-bytes, --socket-buffer-bytes, --splice) override these.
# ------------------------------------------------------------
settings:
  # Enable the HTTP stats endpoint (GET /metrics Prometheus, /stats JSON).
  # Omit / null to disable (default: disabled).
  metrics_addr: "127.0.0.1:9090"
  # Periodic traffic-report log cadence, seconds.
  report_interval_secs: 60
  # Throughput-rate (bytes/sec) sampling cadence, seconds.
  sample_interval_secs: 1
  # Per-direction copy buffer size, bytes (hot-reloadable).
  buffer_bytes: 65536
  # Kernel socket buffer size (SO_SNDBUF/SO_RCVBUF) per socket, bytes.
  # Omit / null leaves the OS default; raise it for high-latency (WAN) links.
  # (hot-reloadable)
  # socket_buffer_bytes: 1048576
  # Use the Linux splice(2) zero-copy data path (Linux only, hot-reloadable).
  use_splice: false
